<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FTC Starter Hub</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <!-- Google Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="assets/css/main.css?v=8">
</head>
<body>
  <header>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">
      <svg class="sun-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="12" r="5"></circle>

      </svg>
      <svg class="moon-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
      </svg>
    </button>
  </header>

  <main>
    <div class="container">
      <h1>FTC Starter Hub</h1>

      <p class="subtitle">
        A centralized hub for FTC rookie teams, students looking to join a team,
        or those interested in starting one.
      </p>

      <h2>Get Started</h2>

      <ul class="cta-buttons">
        <li><a href="/start-team" class="btn btn-primary">Start a Team</a></li>
        <li><a href="/join-team" class="btn btn-secondary">Join a Team</a></li>
        <li><a href="/resources" class="btn btn-secondary">Resources</a></li>
      </ul>
    </div>
  </main>

  <script src="assets/js/main.js?v=8"></script>
</body>
</html>
